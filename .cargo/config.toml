# The workspace no longer pins a default build target. A bare `cargo build`
# builds the target-agnostic core `arborium-rt` rlib natively (see
# `default-members` in the root Cargo.toml); each deployable target is built
# explicitly through the CLI:
#
#   ./scripts/arborium-rt build-runtime   # wasm SIDE_MODULE (emscripten)
#   ./scripts/arborium-rt build-node      # native Node addon (host triple)
#
# Those commands set CARGO_BUILD_TARGET (and, for the wasm build,
# CARGO_UNSTABLE_BUILD_STD) in the environment rather than here, so the global
# default stays native and the two shims don't fight over one pinned target.
#
# The block below is target-scoped: its link args apply ONLY when building for
# wasm32-unknown-emscripten, i.e. only under `build-runtime`. Building the wasm
# cdylib for any other target is undefined — it exists to be loaded as a
# SIDE_MODULE into an emscripten MAIN_MODULE runtime.

[target.wasm32-unknown-emscripten]
rustflags = [
    "-C", "relocation-model=pic",
    "-C", "link-arg=-sSIDE_MODULE=2",
    "-C", "link-arg=-fPIC",
    "-C", "link-arg=-O2",
    # Every `arborium_rt_*` function the crate exposes must appear here; the
    # linker strips anything not listed when building a SIDE_MODULE.
    "-C", "link-arg=-sEXPORTED_FUNCTIONS=_arborium_rt_register_grammar,_arborium_rt_unregister_grammar,_arborium_rt_create_session,_arborium_rt_free_session,_arborium_rt_set_text,_arborium_rt_cancel,_arborium_rt_parse_utf16,_arborium_rt_highlight_to_spans_utf16,_arborium_rt_highlight_to_html,_arborium_rt_free",
]
