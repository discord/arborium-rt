# This crate only builds meaningfully for emscripten; pin the target so
# `cargo build` from this directory does the right thing by default.
#
# Building for any other target (including wasm32-unknown-unknown) is
# undefined behaviour for this crate — it's designed to be loaded as a
# SIDE_MODULE into an emscripten MAIN_MODULE runtime.

[build]
target = "wasm32-unknown-emscripten"

[unstable]
build-std = ["std", "panic_abort"]

[target.wasm32-unknown-emscripten]
rustflags = [
    "-C", "relocation-model=pic",
    "-C", "link-arg=-sSIDE_MODULE=2",
    "-C", "link-arg=-fPIC",
    "-C", "link-arg=-O2",
    # Every `arborium_rt_*` function the crate exposes must appear here; the
    # linker strips anything not listed when building a SIDE_MODULE.
    "-C", "link-arg=-sEXPORTED_FUNCTIONS=_arborium_rt_abi_version,_arborium_rt_register_grammar,_arborium_rt_unregister_grammar,_arborium_rt_create_session,_arborium_rt_free_session,_arborium_rt_set_text,_arborium_rt_cancel,_arborium_rt_parse_utf16,_arborium_rt_highlight_to_spans_utf16,_arborium_rt_highlight_to_html,_arborium_rt_free",
]
