name: Publish

on:
  workflow_dispatch:
    inputs:
      package:
        description: "Which package to release (drives version + tag)"
        required: false
        type: choice
        options:
          - wasm
          - node
          - android
        default: wasm
      tag:
        description: "Release tag (defaults to <package-name>@<version>)"
        required: false
        type: string
      dry-run:
        description: "Build + pack + release, but skip npm/Maven publish"
        required: false
        type: boolean
        default: false

jobs:
  # Reuse the parallelized build pipeline. It produces the runtime wasm,
  # host wasm, every grammar, the per-platform Node addons, the Android AAR,
  # runs the test suite, and uploads the packed `.tgz`, the `.node` binaries,
  # and the `.aar` as artifacts this workflow consumes below — no rebuild here.
  #
  # For an android release (and not a dry-run) we also flip `publish-android`,
  # which lets build.yml's package-android job `gradle publish` the AAR to Maven
  # from the job that built it (it has the .so's + gradle env). secrets: inherit
  # passes GITHUB_TOKEN through for the GitHub Packages push.
  build:
    uses: ./.github/workflows/build.yml
    secrets: inherit
    with:
      publish-android: ${{ inputs.package == 'android' && !inputs.dry-run }}

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      # ── wasm release asset ─────────────────────────────────────────────────
      - name: Download tarball
        if: ${{ inputs.package == 'wasm' }}
        uses: actions/download-artifact@v8
        with:
          name: ${{ needs.build.outputs.tarball-artifact }}
          path: .

      # ── node release assets ────────────────────────────────────────────────
      # The per-platform native addons built by build.yml's package-node matrix.
      # Each artifact preserves its npm/<platform>/ path, but the .node basenames
      # already carry the platform (arborium-rt-node.<platformArchABI>.node), so
      # we flatten them all into ./node-addons/ for flat release attachments.
      # We attach only the raw .node binaries — not the full npm package.
      - name: Download Node addons
        if: ${{ inputs.package == 'node' }}
        uses: actions/download-artifact@v8
        with:
          pattern: node-addon-*
          path: node-addons-raw
          merge-multiple: true

      - name: Flatten Node addons
        if: ${{ inputs.package == 'node' }}
        run: |
          mkdir -p node-addons
          find node-addons-raw -name '*.node' -exec mv {} node-addons/ \;
          ls -l node-addons

      # ── android release asset ──────────────────────────────────────────────
      # The AAR built by build.yml's package-android job. It's already been
      # published to Maven there (unless dry-run); we attach it to the GitHub
      # release too, matching the convention for the other targets' binaries.
      - name: Download Android AAR
        if: ${{ inputs.package == 'android' }}
        uses: actions/download-artifact@v8
        with:
          name: android-aar
          path: android-aar

      # Independent versioning: the tag is qualified with the package name so the
      # wasm (arborium-rt-wasm@X.Y.Z) and node (arborium-rt-node@A.B.C) lineages
      # never collide, even when the two version numbers coincide. The `tag` input
      # overrides this entirely.
      - name: Resolve release metadata
        id: meta
        run: |
          if [ "${{ inputs.package }}" = "node" ]; then
            name="arborium-rt-node"
            version="${{ needs.build.outputs.node-version }}"
          elif [ "${{ inputs.package }}" = "android" ]; then
            name="arborium-rt-android"
            version="${{ needs.build.outputs.android-version }}"
          else
            name="arborium-rt-wasm"
            version="${{ needs.build.outputs.wasm-version }}"
          fi
          tag="${{ inputs.tag }}"
          if [ -z "$tag" ]; then
            tag="${name}@${version}"
          fi
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      # Publishing is allowed to fail (network, version already published,
      # token trouble) — we still want the GitHub release + asset upload
      # below to happen so the artifacts are recoverable.
      #
      # Only the wasm package is npm-published here: the Node package is a
      # multi-package publish (main + five platform sub-packages, with
      # workspace:* rewriting) whose dist/ + binding.cjs aren't produced as
      # build artifacts, so its distribution channel is the attached .node
      # binaries on the GitHub release below.
      - name: Publish to npm
        id: publish
        if: ${{ inputs.package == 'wasm' && !inputs.dry-run }}
        continue-on-error: true
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish "${{ needs.build.outputs.tarball-name }}" --access public

      - name: Create GitHub release
        if: ${{ always() }}
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          tag="${{ steps.meta.outputs.tag }}"
          notes="Release ${tag}"
          if [ "${{ inputs.package }}" = "node" ]; then
            assets=(node-addons/*.node)
            notes="${notes}

          > Node native addons attached. This package is distributed via the attached
          > \`.node\` binaries; npm publish is not automated for it."
          elif [ "${{ inputs.package }}" = "android" ]; then
            assets=(android-aar/*.aar)
            if [ "${{ inputs.dry-run }}" = "true" ]; then
              notes="${notes}

          > dry-run: the AAR is attached but was NOT published to Maven."
            else
              notes="${notes}

          > Android AAR published to Maven as \`com.discord:arborium-rt-android:${{ steps.meta.outputs.version }}\`
          > (also attached here). Add the repo to your build.gradle and depend on it."
            fi
          else
            assets=("${{ needs.build.outputs.tarball-name }}")
            if [ "${{ steps.publish.outcome }}" = "failure" ]; then
              notes="${notes}

          > npm publish failed in this run — install from the attached tarball."
            elif [ "${{ inputs.dry-run }}" = "true" ]; then
              notes="${notes}

          > dry-run: npm publish was skipped."
            fi
          fi
          gh release create "$tag" \
            "${assets[@]}" \
            --target "$GITHUB_SHA" \
            --title "$tag" \
            --notes "$notes"
