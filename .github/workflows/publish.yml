name: Publish

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (defaults to v<package.json version>)"
        required: false
        type: string
      dry-run:
        description: "Build + pack + release, but skip npm publish"
        required: false
        type: boolean
        default: false

jobs:
  # Reuse the parallelized build pipeline. It produces the runtime wasm,
  # host wasm, every grammar, runs the test suite, and uploads the packed
  # `.tgz` as an artifact this workflow consumes below — no rebuild here.
  build:
    uses: ./.github/workflows/build.yml

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Download tarball
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.tarball-artifact }}
          path: .

      - name: Resolve tag
        id: meta
        run: |
          tag="${{ inputs.tag }}"
          if [ -z "$tag" ]; then
            tag="v${{ needs.build.outputs.version }}"
          fi
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      # Publishing is allowed to fail (network, version already published,
      # token trouble) — we still want the GitHub release + tarball upload
      # below to happen so the artifact is recoverable.
      - name: Publish to npm
        id: publish
        if: ${{ !inputs.dry-run }}
        continue-on-error: true
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish "${{ needs.build.outputs.tarball-name }}" --access public

      - name: Create GitHub release
        if: ${{ always() }}
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          tag="${{ steps.meta.outputs.tag }}"
          notes="Release ${tag}"
          if [ "${{ steps.publish.outcome }}" = "failure" ]; then
            notes="${notes}

          > npm publish failed in this run — install from the attached tarball."
          elif [ "${{ inputs.dry-run }}" = "true" ]; then
            notes="${notes}

          > dry-run: npm publish was skipped."
          fi
          gh release create "$tag" "${{ needs.build.outputs.tarball-name }}" \
            --target "$GITHUB_SHA" \
            --title "$tag" \
            --notes "$notes"
