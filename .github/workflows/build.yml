name: Build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_call:
    inputs:
      publish-android:
        description: "Also publish the Android AAR to the configured Maven repo (used by publish.yml)"
        required: false
        type: boolean
        default: false
    outputs:
      wasm-version:
        description: "@discord/arborium-rt-wasm version (from packages/arborium-rt-wasm/package.json)"
        value: ${{ jobs.package-wasm.outputs.wasm-version }}
      node-version:
        description: "@discord/arborium-rt-node version (from packages/arborium-rt-node/package.json)"
        value: ${{ jobs.package-wasm.outputs.node-version }}
      android-version:
        description: "arborium-rt-android AAR version (from packages/arborium-rt-android/gradle.properties)"
        value: ${{ jobs.package-android.outputs.android-version }}
      tarball-name:
        description: filename of the packed npm tarball
        value: ${{ jobs.package-wasm.outputs.tarball-name }}
      tarball-artifact:
        description: name of the workflow artifact containing the .tgz tarball
        value: ${{ jobs.package-wasm.outputs.tarball-artifact }}

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# `hostTriple()` in cli/src/lib/util.ts: the patched tree-sitter CLI lives at
# this path on a linux x64 runner. The `tree-sitter-cli` job uploads it here;
# the `grammars-wasm` and `grammars-native` matrices download it back.
env:
  TREE_SITTER_BIN_DIR: third_party/tree-sitter/target/x86_64-unknown-linux-gnu/release

jobs:
  # ── Shared toolchain (host-native) ────────────────────────────────────────
  # The one prerequisite every grammar build shares: the patched tree-sitter
  # CLI (sparse-only parser tables). Building it needs cargo but NOT emcc — it's
  # a host-native binary, independent of any wasm or node target. Also enumerates
  # the arborium groups that drive the grammar matrix (a pure arborium.yaml read).
  tree-sitter-cli:
    runs-on: ubuntu-latest
    outputs:
      groups: ${{ steps.list-groups.outputs.groups }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - uses: dtolnay/rust-toolchain@nightly

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: Bootstrap submodule (patches + render Cargo.toml + build patched tree-sitter CLI)
        run: ./scripts/arborium-rt bootstrap

      # Only groups with at least one buildable grammar (license-allowed, not
      # in DISABLED_GRAMMARS) — drives the grammars-wasm matrix below.
      - name: Enumerate arborium groups
        id: list-groups
        run: |
          groups=$(./scripts/arborium-rt list-groups --json)
          echo "groups=$groups" >> "$GITHUB_OUTPUT"
          echo "found groups: $groups"

      - name: Upload patched tree-sitter CLI
        uses: actions/upload-artifact@v7
        with:
          name: tree-sitter-cli
          path: ${{ env.TREE_SITTER_BIN_DIR }}/tree-sitter
          if-no-files-found: error
          retention-days: 7

  # ── Browser target: runtime SIDE_MODULE (wasm32-unknown-emscripten) ───────
  # The Rust runtime wasm. Corpus-independent and independent of the patched
  # tree-sitter CLI, so it runs from the start in parallel with everything else.
  # Needs nightly Rust + rust-src (build-std) + the emscripten target + emcc
  # (the wasm linker). `apply-patches` renders the arborium crates' Cargo.toml
  # this build depends on; it does NOT build the tree-sitter CLI.
  runtime-wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - uses: dtolnay/rust-toolchain@nightly
        with:
          targets: wasm32-unknown-emscripten
          components: rust-src

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install emsdk 5.0.6
        run: |
          git clone --depth 1 https://github.com/emscripten-core/emsdk.git "$HOME/emsdk"
          "$HOME/emsdk/emsdk" install 5.0.6
          "$HOME/emsdk/emsdk" activate 5.0.6
          source "$HOME/emsdk/emsdk_env.sh"
          echo "EMSDK=$EMSDK" >> "$GITHUB_ENV"
          echo "EMSDK_NODE=$EMSDK_NODE" >> "$GITHUB_ENV"
          echo "$EMSDK" >> "$GITHUB_PATH"
          echo "$EMSDK/upstream/emscripten" >> "$GITHUB_PATH"
          emcc --version

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      # Working-tree-only setup (reset + git apply + render Cargo.toml). The
      # runtime crate path-deps the arborium crates, whose Cargo.toml is
      # generated from templates here. No tree-sitter CLI build needed.
      - name: Apply submodule patches
        run: ./scripts/arborium-rt apply-patches

      - name: Build runtime SIDE_MODULE
        run: ./scripts/arborium-rt build wasm runtime

      - name: Upload runtime wasm
        uses: actions/upload-artifact@v7
        with:
          name: runtime-wasm
          path: target/wasm32-unknown-emscripten/release/arborium_rt_wasm.wasm
          if-no-files-found: error
          retention-days: 7

  # ── Browser target: web-tree-sitter host (MAIN_MODULE=2) ──────────────────
  # The emscripten MAIN_MODULE that hosts the runtime + grammar SIDE_MODULEs.
  # Pure emcc compile of the arborium-tree-sitter crate's C sources — no Rust,
  # no patched tree-sitter CLI, no rendered Cargo.toml, no corpus. Runs from
  # the start in parallel with everything else.
  host-wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install emsdk 5.0.6
        run: |
          git clone --depth 1 https://github.com/emscripten-core/emsdk.git "$HOME/emsdk"
          "$HOME/emsdk/emsdk" install 5.0.6
          "$HOME/emsdk/emsdk" activate 5.0.6
          source "$HOME/emsdk/emsdk_env.sh"
          echo "EMSDK=$EMSDK" >> "$GITHUB_ENV"
          echo "EMSDK_NODE=$EMSDK_NODE" >> "$GITHUB_ENV"
          echo "$EMSDK" >> "$GITHUB_PATH"
          echo "$EMSDK/upstream/emscripten" >> "$GITHUB_PATH"
          emcc --version

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: Build web-tree-sitter host (MAIN_MODULE)
        run: ./scripts/arborium-rt build wasm host

      - name: Upload host wasm
        uses: actions/upload-artifact@v7
        with:
          name: host-wasm
          path: |
            target/host-wasm/web-tree-sitter.wasm
            target/host-wasm/web-tree-sitter.mjs
          if-no-files-found: error
          retention-days: 7

  # ── Browser target: per-grammar SIDE_MODULEs ──────────────────────────────
  # Per-arborium-group fan-out. Each job builds every grammar in its group to
  # wasm and uploads target/grammars/<lang>/ for the package job to merge.
  # Needs emcc + the patched tree-sitter CLI (from `tree-sitter-cli`) + askalono
  # (fetch-license). No Rust toolchain — `build wasm grammars` compiles parser.c
  # with emcc and flattens queries; it never invokes cargo.
  grammars-wasm:
    needs: tree-sitter-cli
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        group: ${{ fromJSON(needs.tree-sitter-cli.outputs.groups) }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install emsdk 5.0.6
        run: |
          git clone --depth 1 https://github.com/emscripten-core/emsdk.git "$HOME/emsdk"
          "$HOME/emsdk/emsdk" install 5.0.6
          "$HOME/emsdk/emsdk" activate 5.0.6
          source "$HOME/emsdk/emsdk_env.sh"
          echo "EMSDK=$EMSDK" >> "$GITHUB_ENV"
          echo "EMSDK_NODE=$EMSDK_NODE" >> "$GITHUB_ENV"
          echo "$EMSDK" >> "$GITHUB_PATH"
          echo "$EMSDK/upstream/emscripten" >> "$GITHUB_PATH"
          emcc --version

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: Download patched tree-sitter CLI
        uses: actions/download-artifact@v8
        with:
          name: tree-sitter-cli
          path: ${{ env.TREE_SITTER_BIN_DIR }}

      - name: Make tree-sitter executable
        run: chmod +x ${{ env.TREE_SITTER_BIN_DIR }}/tree-sitter

      # Required by `build wasm grammars` for the upstream LICENSE/NOTICE fetch step —
      # fetch-license shells out to `askalono crawl` to identify license files
      # in each grammar's shallow clone.
      - name: Install askalono CLI
        uses: baptiste0928/cargo-install@v3
        with:
          crate: askalono-cli
          version: "0.5.0"

      # The patched submodule working tree doesn't propagate across jobs (each
      # runner gets a fresh `submodules: recursive` checkout). `apply-patches`
      # is the working-tree half of bootstrap (reset + git apply + render
      # Cargo.toml) — without it, patches like 0002-inject-markdown-inline are
      # never applied here, so markdown's flattened injections.scm would ship
      # without the `(inline) → markdown_inline` rule. We reuse the CLI artifact
      # from `tree-sitter-cli`, so we skip rebuilding it.
      - name: Apply submodule patches
        run: ./scripts/arborium-rt apply-patches

      - name: Build grammars in ${{ matrix.group }}
        run: ./scripts/arborium-rt build wasm grammars --group ${{ matrix.group }}

      # Each grammar's intermediate `build/` (parser.o, scanner.o, staged
      # node_modules) lives under target/grammars/<lang>/build/ and balloons the
      # artifact 5–10×. Only the wasm + flattened .scm files are needed downstream.
      - name: Upload grammar artifacts
        uses: actions/upload-artifact@v7
        with:
          name: grammars-${{ matrix.group }}
          path: |
            target/grammars/
            !target/grammars/*/build/
          if-no-files-found: error
          retention-days: 7

  # ── Native grammar staging (per-group fan-out, platform-independent) ──────
  # `build native grammars` → parser.c + scanner + flattened queries for each
  # grammar. The output is plain source, identical for every target platform, so
  # it's staged ONCE here and reused by every statically-linked target's link job
  # below (Node addon + Android AAR). Sharded per arborium group (like
  # grammars-wasm) so the heavy generates spread across runners instead of
  # OOM-ing one. Needs the patched tree-sitter CLI (from `tree-sitter-cli`) +
  # node; NOT Rust, NOT emcc.
  grammars-native:
    needs: tree-sitter-cli
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        group: ${{ fromJSON(needs.tree-sitter-cli.outputs.groups) }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: Download patched tree-sitter CLI
        uses: actions/download-artifact@v8
        with:
          name: tree-sitter-cli
          path: ${{ env.TREE_SITTER_BIN_DIR }}

      - name: Make tree-sitter executable
        run: chmod +x ${{ env.TREE_SITTER_BIN_DIR }}/tree-sitter

      # The patched submodule working tree doesn't propagate across jobs;
      # apply-patches re-runs the working-tree half of bootstrap so staged
      # grammars carry the same patches (e.g. markdown injection) as everywhere.
      - name: Apply submodule patches
        run: ./scripts/arborium-rt apply-patches

      - name: Stage grammars in ${{ matrix.group }}
        run: ./scripts/arborium-rt build native grammars --group ${{ matrix.group }}

      # Upload the staged sources only. Each shard writes its own manifest.json
      # covering just this group; the link jobs regenerate a complete manifest by
      # scanning the merged dirs, so the per-shard manifest is excluded to avoid
      # cross-shard filename collisions on download.
      - name: Upload staged grammar sources
        uses: actions/upload-artifact@v7
        with:
          name: grammars-native-${{ matrix.group }}
          path: |
            target/native-grammars/
            !target/native-grammars/manifest.json
          if-no-files-found: error
          retention-days: 7

  # ── Node packaging: link the native addon (per-platform matrix) ───────────
  # Downloads the platform-independent staged sources from `grammars-native`,
  # regenerates the manifest from them (`build node` — no tree-sitter CLI
  # needed), then runs `napi build --platform` to statically link every grammar
  # into one `arborium-rt-node.<platformArchABI>.node`. Needs nightly Rust + a
  # C/C++ compiler (preinstalled); NOT emcc, NOT the tree-sitter CLI. Every entry
  # runs on a NATIVE runner for its platform, so there is no cross toolchain and
  # no `--target`: `--platform` builds for (and names the artifact after) the
  # runner's own platform. Adding a platform is one more matrix entry — the
  # staging above is shared and never re-runs per platform.
  package-node:
    needs: grammars-native
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x64
            runs-on: ubuntu-latest
          - platform: linux-arm64
            runs-on: ubuntu-24.04-arm
          # darwin-x64 is cross-compiled from the Apple Silicon runner:
          # GitHub's Intel macOS runners (macos-13) queue for a very long time,
          # and Apple's clang cross-compiles to x86_64 with no extra toolchain.
          # napi names the artifact after the target triple's platformArchABI
          # (x86_64-apple-darwin → darwin-x64), so the sub-package dir is the same.
          - platform: darwin-x64
            runs-on: macos-14
            target: x86_64-apple-darwin
          - platform: darwin-arm64
            runs-on: macos-14
          - platform: win32-x64-msvc
            runs-on: windows-latest
          - platform: win32-arm64-msvc
            runs-on: windows-11-arm
    runs-on: ${{ matrix.runs-on }}
    # The ./scripts/arborium-rt wrapper is a bash script; Windows runners
    # default to PowerShell, so force bash for every run step in this job.
    # bash is already the default on the linux/macos matrix entries, so this
    # is a no-op there.
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      # `targets` adds the cross-compile std for matrix.target (e.g.
      # x86_64-apple-darwin on the arm64 runner); empty for native entries.
      - uses: dtolnay/rust-toolchain@nightly
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: Download staged grammar sources
        uses: actions/download-artifact@v8
        with:
          pattern: grammars-native-*
          path: target/native-grammars
          merge-multiple: true

      # Renders the arborium crates' Cargo.toml that arborium-rt-node depends on.
      # No tree-sitter CLI build — staging already ran in grammars-native.
      - name: Apply submodule patches
        run: ./scripts/arborium-rt apply-patches

      # Builds the addon and stages it into its per-platform sub-package,
      # packages/arborium-rt-node/npm/<platform>/. matrix.target (when set)
      # cross-compiles; otherwise it builds for this runner's native platform.
      # It also regenerates binding.cjs + binding.d.cts, which the next step's
      # tsc needs to typecheck the wrapper.
      - name: Link Node native addon (${{ matrix.platform }})
        run: ./scripts/arborium-rt build node ${{ matrix.target && format('--target {0}', matrix.target) || '' }}

      - name: Annotate addon size
        shell: bash
        run: |
          f=$(ls packages/arborium-rt-node/npm/*/arborium-rt-node.*.node)
          bytes=$(wc -c < "$f")
          {
            echo "## Node addon size (${{ matrix.platform }})"
            echo ""
            printf '`%s` — %s bytes\n' "$f" "$bytes"
          } >> "$GITHUB_STEP_SUMMARY"

      # Upload the staged sub-package binary, preserving the npm/<platform>/
      # path so a publish job can merge every matrix entry's artifact straight
      # back into the workspace tree (the npm/<platform>/package.json is already
      # committed, so only the .node travels).
      - name: Upload Node addon
        uses: actions/upload-artifact@v7
        with:
          name: node-addon-${{ matrix.platform }}
          path: packages/arborium-rt-node/npm/*/arborium-rt-node.*.node
          if-no-files-found: error
          retention-days: 7

      # `test:ci` is `tsc && vitest run` — it tests the addon just linked above
      # (the runner's native binary, resolved through the npm/<platform>
      # workspace package), WITHOUT the `pretest` re-stage (`build native
      # grammars …`) the default `test` runs. Re-staging would need the
      # tree-sitter CLI, which this job deliberately doesn't have.
      #
      # Skipped for cross-compiled entries (matrix.target): the runner can't
      # load a foreign-arch addon (e.g. an x86_64 .node on the arm64 runner).
      # The native darwin-arm64 entry already exercises the same TS + addon path
      # on macOS.
      - name: Test Node addon package
        if: ${{ !matrix.target }}
        run: pnpm --filter @discord/arborium-rt-node run test:ci

  # ── Android packaging: cross-compile the JNI shim + assemble the AAR ──────
  # Downloads the same platform-independent staged sources as package-node, then
  # cross-compiles ffi/android for every Android ABI with cargo-ndk (a single
  # Linux host builds all ABIs against the NDK sysroot — no per-ABI runner) and
  # assembles the release AAR with the Android Gradle plugin. Needs nightly Rust
  # + the four Android target stds (prebuilt, no build-std), the Android NDK,
  # cargo-ndk, and JDK + Gradle. NOT emcc, NOT the tree-sitter CLI.
  package-android:
    needs: grammars-native
    runs-on: ubuntu-latest
    # packages: write lets the conditional Maven-publish step push to GitHub
    # Packages when publish.yml sets `publish-android`. Harmless on push/PR runs,
    # where the publish step is gated off.
    permissions:
      contents: read
      packages: write
    outputs:
      android-version: ${{ steps.meta.outputs.android-version }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - uses: dtolnay/rust-toolchain@nightly
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      # A single-file NDK install; `build android`'s cargo-ndk reads ANDROID_NDK_HOME.
      - name: Install Android NDK
        run: |
          sdkmanager "ndk;26.3.11579264"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/26.3.11579264" >> "$GITHUB_ENV"

      # Puts `gradle` on PATH (the AAR package has no committed wrapper); the
      # assembleRelease step in `build android` falls back to it.
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Install cargo-ndk
        uses: baptiste0928/cargo-install@v3
        with:
          crate: cargo-ndk
          version: "3.5.4"

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: Download staged grammar sources
        uses: actions/download-artifact@v8
        with:
          pattern: grammars-native-*
          path: target/native-grammars
          merge-multiple: true

      # Renders the arborium crates' Cargo.toml that ffi/android depends on.
      # No tree-sitter CLI build — staging already ran in grammars-native.
      - name: Apply submodule patches
        run: ./scripts/arborium-rt apply-patches

      # cargo-ndk cross-compiles libarborium_rt.so for every ABI into the AAR
      # package's jniLibs/, then gradle assembleRelease bundles them into the AAR.
      - name: Build Android .so per ABI + assemble AAR
        run: ./scripts/arborium-rt build android

      - name: Resolve Android version
        id: meta
        run: |
          v=$(grep -E '^VERSION_NAME=' packages/arborium-rt-android/gradle.properties | cut -d= -f2)
          echo "android-version=${v}" >> "$GITHUB_OUTPUT"

      - name: Upload AAR
        uses: actions/upload-artifact@v7
        with:
          name: android-aar
          path: packages/arborium-rt-android/build/outputs/aar/*.aar
          if-no-files-found: error
          retention-days: 7

      # Publish the AAR to the configured Maven repo (GitHub Packages by default;
      # override with ARBORIUM_MAVEN_URL/_USER/_TOKEN for an internal repo) so a
      # private build.gradle at Discord can resolve com.discord:arborium-rt-android.
      # Only fires when publish.yml requests it; the assembleRelease above already
      # ran, so `publish` reuses the up-to-date AAR. GITHUB_ACTOR is auto-set.
      - name: Publish AAR to Maven
        if: ${{ inputs.publish-android }}
        working-directory: packages/arborium-rt-android
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gradle publish

  # ── Browser target: assemble + test + pack the npm package ────────────────
  # Aggregator: merge every group's grammar wasms, stage the host + runtime
  # wasms, run `package wasm grammars` to populate dist/grammars/ and regenerate
  # src/grammars.ts, then build, test, and pack the publishable tarball.
  # Depends only on the three browser jobs — NOT on the node addon. Pure
  # node/pnpm work; no Rust, no emcc. The tarball is uploaded so the publish
  # workflow can consume it without rebuilding.
  package-wasm:
    needs: [host-wasm, runtime-wasm, grammars-wasm]
    runs-on: ubuntu-latest
    outputs:
      wasm-version: ${{ steps.meta.outputs.wasm-version }}
      node-version: ${{ steps.meta.outputs.node-version }}
      tarball-name: ${{ steps.pack.outputs.tarball }}
      tarball-artifact: ${{ steps.pack.outputs.artifact-name }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: Download runtime wasm
        uses: actions/download-artifact@v8
        with:
          name: runtime-wasm
          path: target/wasm32-unknown-emscripten/release

      - name: Download host wasm
        uses: actions/download-artifact@v8
        with:
          name: host-wasm
          path: target/host-wasm

      - name: Download all grammar artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: grammars-*
          path: target/grammars
          merge-multiple: true

      - name: Stage host + runtime wasms into dist/
        run: ./scripts/arborium-rt package wasm host

      # Shared by both `package wasm grammars` (per-grammar `askalono crawl` over each
      # already-downloaded grammar dir to identify its LICENSE/NOTICE files — a
      # fast local scan, no network) and the THIRD_PARTY_NOTICES step below.
      # Installed once; the action caches the built binary so warm runs are fast.
      - name: Install askalono CLI
        uses: baptiste0928/cargo-install@v3
        with:
          crate: askalono-cli
          version: "0.5.0"

      # Stages each built grammar's wasm + flattened queries + attribution into
      # dist/grammars/ and regenerates the grammars.ts index. THIRD_PARTY_NOTICES
      # is generated separately below — it's the only step that clones every
      # upstream over the network, so it doesn't gate the test run.
      - name: Package every grammar into dist/grammars/
        run: ./scripts/arborium-rt package wasm grammars

      - name: Annotate wasm sizes
        run: |
          {
            echo "## Built wasm sizes"
            echo ""
            echo "| File | Size |"
            echo "|------|------|"
            find target/wasm32-unknown-emscripten/release/arborium_rt_wasm.wasm \
                 target/host-wasm/web-tree-sitter.wasm \
                 target/grammars -name '*.wasm' \
              | sort \
              | while read -r f; do
                  bytes=$(stat -c %s "$f")
                  human=$(numfmt --to=iec-i --suffix=B --format='%.2f' "$bytes")
                  printf '| `%s` | %s (%s bytes) |\n' "$f" "$human" "$bytes"
                done
          } >> "$GITHUB_STEP_SUMMARY"

      # Skip the Node addon package: its `tsc` build now imports the
      # napi-generated `binding.cjs`/`binding.d.cts`, which only exist after a
      # native `build node` (Rust + staged sources) — done in the package-node
      # job, not here. The browser package + CLI build with no extra toolchain.
      - name: Build TypeScript packages
        run: pnpm -r --filter='!@discord/arborium-rt-node' build

      # Only the browser package here. The Node addon package is built + tested
      # in the package-node job (it needs Rust + staged grammar sources, which this
      # job doesn't set up); its `pretest` runs `build native grammars` + `build
      # node`, so it must not fire here. The CLI's own unit tests run alongside
      # (no extra toolchain).
      - name: Run tests
        run: pnpm -r --filter='!@discord/arborium-rt-node' test

      # Decoupled from `package wasm grammars`: clones every upstream at its pinned
      # commit and writes THIRD_PARTY_NOTICES into the runtime package's dist/
      # (and the repo root) so the packed tarball ships it. Runs after the tests
      # so the network-heavy clone pass doesn't delay test feedback, and before
      # pack so dist/ contains the file. (askalono installed above.)
      - name: Regenerate THIRD_PARTY_NOTICES
        run: ./scripts/arborium-rt notices

      # Both publishable packages are versioned independently; publish.yml picks
      # one per run and qualifies the tag with the package name. Read both here so
      # either version is available downstream without a second checkout.
      - name: Resolve versions
        id: meta
        run: |
          wasm_version=$(node -p "require('./packages/arborium-rt-wasm/package.json').version")
          node_version=$(node -p "require('./packages/arborium-rt-node/package.json').version")
          echo "wasm-version=${wasm_version}" >> "$GITHUB_OUTPUT"
          echo "node-version=${node_version}" >> "$GITHUB_OUTPUT"

      - name: Pack tarball
        id: pack
        working-directory: packages/arborium-rt-wasm
        run: |
          pnpm pack --pack-destination "$GITHUB_WORKSPACE"
          tarball="discord-arborium-rt-wasm-${{ steps.meta.outputs.wasm-version }}.tgz"
          if [ ! -f "$GITHUB_WORKSPACE/$tarball" ]; then
            echo "expected tarball not found: $tarball" >&2
            ls "$GITHUB_WORKSPACE" >&2
            exit 1
          fi
          echo "tarball=${tarball}" >> "$GITHUB_OUTPUT"
          echo "artifact-name=arborium-rt-wasm-${{ steps.meta.outputs.wasm-version }}" >> "$GITHUB_OUTPUT"

      - name: Upload tarball artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.pack.outputs.artifact-name }}
          path: ${{ steps.pack.outputs.tarball }}
          if-no-files-found: error
          retention-days: 14
